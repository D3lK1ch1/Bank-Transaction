on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24.13.0'
          cache: 'npm'

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run test:run

      - run: npm run build